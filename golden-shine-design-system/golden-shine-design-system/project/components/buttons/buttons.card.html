<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface-card); }
  .grid { display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .lbl { font-family:var(--font-body); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); width:100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, IconButton } = window.GoldenShineDesignSystem_23f889;
    const Phone = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const Arrow = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>;
    const App = () => (
      <div className="grid">
        <div className="row"><span className="lbl">Variants</span>
          <Button variant="accent">Get a quote</Button>
          <Button variant="primary">Book now</Button>
          <Button variant="secondary">Services</Button>
          <Button variant="ghost">Cancel</Button>
        </div>
        <div className="row"><span className="lbl">Sizes &amp; icons</span>
          <Button variant="accent" size="lg" rightIcon={<Arrow/>}>Book a cleaning</Button>
          <Button variant="primary" size="md" leftIcon={<Phone/>}>Call us</Button>
          <Button variant="secondary" size="sm">Details</Button>
        </div>
        <div className="row"><span className="lbl">Disabled &amp; circular</span>
          <Button variant="accent" disabled>Unavailable</Button>
          <IconButton label="Call" variant="accent"><Phone/></IconButton>
          <IconButton label="Next" variant="soft"><Arrow/></IconButton>
          <IconButton label="Next" variant="solid"><Arrow/></IconButton>
        </div>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body></html>
