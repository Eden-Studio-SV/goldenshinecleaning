<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid — tokens --space-1 → --space-9" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--surface-card); font-family:var(--font-body); }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .item { text-align:center; }
  .bar { background:var(--coral-500); border-radius:var(--radius-xs); width:100%; }
  .b1{height:4px}.b2{height:8px}.b3{height:12px}.b4{height:16px}.b5{height:24px}.b6{height:32px}.b7{height:40px}.b8{height:48px}.b9{height:64px}
  .lbl { font-size:11px; color:var(--text-strong); font-weight:700; margin-top:6px; }
  .px { font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="item" style="width:34px"><div class="bar b1"></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="item" style="width:34px"><div class="bar b2"></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="item" style="width:34px"><div class="bar b3"></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="item" style="width:40px"><div class="bar b4"></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="item" style="width:48px"><div class="bar b5"></div><div class="lbl">5</div><div class="px">24</div></div>
    <div class="item" style="width:56px"><div class="bar b6"></div><div class="lbl">6</div><div class="px">32</div></div>
    <div class="item" style="width:64px"><div class="bar b7"></div><div class="lbl">7</div><div class="px">40</div></div>
    <div class="item" style="width:72px"><div class="bar b8"></div><div class="lbl">8</div><div class="px">48</div></div>
    <div class="item" style="width:88px"><div class="bar b9"></div><div class="lbl">9</div><div class="px">64</div></div>
  </div>
</body></html>
