<!-- @dsCard group="Type" viewport="700x230" name="Display — Poppins" subtitle="Headings & UI — geometric, matches logo caps" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--surface-card); font-family:var(--font-display); color:var(--text-strong); }
  .line { display:flex; align-items:baseline; gap:14px; margin-bottom:6px; }
  .lbl { font-family:var(--font-body); font-size:11px; color:var(--text-muted); width:96px; flex:none; }
  .t1 { font-size:36px; font-weight:800; letter-spacing:-0.02em; }
  .t2 { font-size:28px; font-weight:700; }
  .t3 { font-size:18px; font-weight:600; }
  .eb { font-size:13px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--coral-500); }
</style></head>
<body>
  <div class="line"><span class="lbl">Display / 800</span><span class="t1">Sparkling clean, every time</span></div>
  <div class="line"><span class="lbl">Heading / 700</span><span class="t2">Trusted home &amp; office care</span></div>
  <div class="line"><span class="lbl">Subhead / 600</span><span class="t3">Book in under two minutes</span></div>
  <div class="line"><span class="lbl">Eyebrow / caps</span><span class="eb">Cleaning Service</span></div>
</body></html>
