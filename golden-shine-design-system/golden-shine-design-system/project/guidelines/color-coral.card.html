<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Coral" subtitle="Accent coral from the spray bottle" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--surface-card); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-xs); }
  .chip { height:64px; }
  .meta { padding:8px 10px; font-family:var(--font-body); }
  .name { font-size:12px; font-weight:700; color:var(--text-strong); }
  .hex { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
  .star { outline:2px solid var(--navy-700); outline-offset:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--coral-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#B5392A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--coral-600)"></div><div class="meta"><div class="name">600</div><div class="hex">#DB493C</div></div></div>
    <div class="sw star"><div class="chip" style="background:var(--coral-500)"></div><div class="meta"><div class="name">500 ★</div><div class="hex">#E85844</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--coral-400)"></div><div class="meta"><div class="name">400</div><div class="hex">#F26B4E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--coral-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#F88E76</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--coral-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#FCE3DC</div></div></div>
  </div>
</body></html>
