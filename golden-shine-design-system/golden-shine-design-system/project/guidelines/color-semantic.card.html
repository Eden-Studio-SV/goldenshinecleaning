<!-- @dsCard group="Colors" viewport="700x140" name="Semantic — Status" subtitle="Success, warning, danger, info" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--surface-card); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-xs); }
  .chip { height:54px; }
  .meta { padding:8px 10px; font-family:var(--font-body); }
  .name { font-size:12px; font-weight:700; color:var(--text-strong); }
  .hex { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success-500)"></div><div class="meta"><div class="name">Success</div><div class="hex">#2A9D63</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--warning-500)"></div><div class="meta"><div class="name">Warning</div><div class="hex">#E89B2C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--danger-500)"></div><div class="meta"><div class="name">Danger</div><div class="hex">#E04A38</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--info-500)"></div><div class="meta"><div class="name">Info</div><div class="hex">#1E5BA8</div></div></div>
  </div>
</body></html>
