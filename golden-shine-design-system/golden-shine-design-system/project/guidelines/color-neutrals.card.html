<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Cream & Neutrals" subtitle="Warm light surfaces and navy-tinted text grays" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--surface-card); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-xs); border:1px solid var(--border-subtle); }
  .chip { height:64px; }
  .meta { padding:8px 10px; font-family:var(--font-body); }
  .name { font-size:12px; font-weight:700; color:var(--text-strong); }
  .hex { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cream-100)"></div><div class="meta"><div class="name">Cream 100</div><div class="hex">#FFFDF2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cream-200)"></div><div class="meta"><div class="name">Cream 200 ★</div><div class="hex">#FCF6CB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><div class="meta"><div class="name">Ink 100</div><div class="hex">#EEF1F5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="meta"><div class="name">Ink 400</div><div class="hex">#8493A6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">Ink 700</div><div class="hex">#2C3C52</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#0E1C30</div></div></div>
  </div>
</body></html>
