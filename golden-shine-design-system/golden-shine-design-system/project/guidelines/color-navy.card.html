<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Navy" subtitle="Primary navy scale from the logo ground" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--surface-card); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-xs); }
  .chip { height:64px; }
  .meta { padding:8px 10px; font-family:var(--font-body); }
  .name { font-size:12px; font-weight:700; color:var(--text-strong); }
  .hex { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
  .star { outline:2px solid var(--coral-500); outline-offset:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="meta"><div class="name">900</div><div class="hex">#06203F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="meta"><div class="name">800</div><div class="hex">#0A2E5C</div></div></div>
    <div class="sw star"><div class="chip" style="background:var(--navy-700)"></div><div class="meta"><div class="name">700 ★</div><div class="hex">#0B3774</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-500)"></div><div class="meta"><div class="name">500</div><div class="hex">#1E5BA8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#8FAED9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#E6EEF7</div></div></div>
  </div>
</body></html>
